# zhiwei-rag 配置

paths:
  # 数据源
  obsidian_vault: ~/Documents/ZhiweiVault
  research_library: ~/Documents/Library
  klib_db: ~/Documents/Library/klib.db

  # 存储
  lance_db: ~/zhiwei-rag/data/lance_db
  models_cache: ~/zhiwei-rag/data/models

  # 多模态
  image_output: /tmp/zhiwei_images
  ppt_image_output: /tmp/zhiwei_ppt_images

embedding:
  model_name: BAAI/bge-large-zh-v1.5
  device: mps  # Apple Silicon，备选：cpu
  dimension: 1024
  normalize: true
  idle_timeout: 300  # 5分钟无调用自动释放

reranker:
  # Reranker 类型：bge（本地）/ cohere（云端）/ voyage（云端）
  type: bge

  # BGE 配置（本地模型）
  bge:
    model_name: BAAI/bge-reranker-base
    device: mps
    batch_size: 8
    score_threshold: 0.1

  # Cohere 配置（云端 API，需设置 COHERE_API_KEY）
  cohere:
    model: rerank-multilingual-v3.0
    score_threshold: 0.01

  # Voyage 配置（云端 API，需设置 VOYAGE_API_KEY）
  voyage:
    model: rerank-2
    score_threshold: 0.01

splitter:
  max_chunk_tokens: 480
  min_chunk_chars: 100
  # 研报通常没有标准 Markdown 标题，启用段落回退
  fallback_to_paragraph: true

# DKI (Dynamic Knowledge Isolation) 知识隔离配置
# 这些目录的内容不会进入 RAG 索引
dki:
  skip_dirs:
    - Inbox                        # 收集箱：待处理内容不入库
    - 72_视频笔记_Video-Distill     # DKI：视频文稿隔离，保护核心知识库
    - 90-99_系统与归档_System       # 系统归档
    - 92_归档备份                   # 历史归档
    - 归档
    - Archive
    - attachments                  # 附件目录

retrieval:
  vector_top_k: 15
  fts_top_k: 10
  graph_top_k: 5
  rerank_top_k: 5

context:
  max_tokens: 4000

# 多模态配置
multimodal:
  # OCR 配置
  ocr:
    enabled: true
    engine: paddleocr  # paddleocr / easyocr
    lang: ch           # ch / en
    use_angle_cls: true
    use_gpu: false
    use_mps: true      # Apple Silicon 加速

  # VLM 配置
  vlm:
    enabled: true
    prefer_local: true  # 优先本地模型
    local_model: qwen2-vl-2b  # qwen2-vl-7b / qwen2-vl-2b / minicpm-v
    cloud_model: qwen-vl-plus  # 云端降级模型
    device: auto       # auto / cuda / mps / cpu
    max_tokens: 1024

  # 图片处理
  image:
    min_size: 100          # 最小图片尺寸
    extract_from_pdf: true # 从 PDF 提取图片
    extract_from_ppt: true # 从 PPT 提取图片
    dedupe: true           # 图片去重

  # PPT 解析
  ppt:
    extract_images: true
    extract_notes: true
